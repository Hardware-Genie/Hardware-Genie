{%extends "base.html"%}
{% block main %}
    <div class="main_block">
        <h1>Scraper</h1>
        <form action="" method="POST" novalidate>
            {{ form.hidden_tag() }}
            <p>{{ form.name.label }} <br> {{ form.name(size=50) }}</p>
            <p>{{ form.url.label }} <br> {{ form.url(size=50) }}</p>
            <p>{{ form.submit() }}</p>
        </form>
    </div>
{% endblock %}
