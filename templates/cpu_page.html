{% extends "base.html" %}
{% block main %}
    <div class="main_block">
        <table>
            <tr>
                <th>Name</th>
                <th>Price</th>
            </tr>
            {% for i in range(labels|length) %}
            <tr>
                <td><a href="{{ url_for('cpu_graphs') }}" style="text-decoration:none"><div>{{ labels[i] }}</div></a></td>
                <td>${{ price[i] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
{% endblock %}
