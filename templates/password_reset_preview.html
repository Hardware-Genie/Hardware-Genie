{% extends "base.html" %}
{% block main %}

<section class="auth-page">
    <div class="auth-card" style="text-align: center;">
        <h1 class="auth-title">Reset Password</h1>
        <img
            src="{{ preview_image }}"
            alt="Password reset preview"
            style="display:block; width:min(100%, 340px); margin: 0 auto 18px; border-radius: 12px;"
        >
        <p class="auth-switch">Thats sad... anyway</p>
        <p class="auth-switch">Redirecting to the reset form in 10 seconds.</p>
        <p class="auth-switch"><a href="{{ redirect_url }}">Go now</a></p>
    </div>
</section>

<script>
    window.setTimeout(function () {
        window.location.href = "{{ redirect_url }}";
    }, 10000);
</script>

{% endblock %}
