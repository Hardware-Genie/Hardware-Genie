{% extends "base.html" %}
{% block main %}
    <div class="main_block">
        <a href="javascript:history.back()">← Back</a>
        <h1>Memory Price History</h1>
        <table>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Date</th>
            </tr>
            {% for i in range(names|length) %}
            <tr>
                <td><a href="{{ url_for('memory_graphs') }}" style="text-decoration:none"><div>{{ names[i] }}</div></a></td>
                <td>${{ price[i] }}</td>
                <td>{{ date[i] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
{% endblock %}
