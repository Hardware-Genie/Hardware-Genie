{% extends 'base.html' %}
{% block main %}
<h1>Memory Graphs</h1>

    <div style="height: 50vh; width: 50%;">
        <canvas id="myChart"></canvas>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dates = {{ date | tojson | safe }};
            const chartData = {{ price | tojson | safe }};
            const names = {{ names | tojson | safe }};

            const data = {
                labels: dates,
                datasets: [{
                    label: 'Price',
                    backgroundColor: 'rgba(45, 222, 54, 0.6)',
                    borderColor: 'rgba(45, 222, 54, 1)',
                    borderWidth: 1,
                    data: chartData,
                }]
            };

            const config = {
                type: 'bar',
                data: data,
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            };

            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, config);
        });
    </script>

{% endblock %}
